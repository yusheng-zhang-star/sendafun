           existing editor code (DOC §233: existing mature editor code never modified).
           - User picks a language → 302 with Set-Cookie saf_lang_override=xx,
             then the Worker skips all future Geo auto-redirects for the session. -->
      <label for="safLangPicker" style="display:inline-flex;align-items:center;gap:0.35rem;font-size:0.9rem;color:#4b5563;white-space:nowrap;" aria-label="Select your language">
        <span aria-hidden="true">🌐</span>

                style="min-height:44px;min-width:86px;padding:0.45rem 0.5rem;border-radius:0.6rem;border:1px solid rgba(148,163,184,0.5);background:rgba(255,255,255,0.75);color:#334155;font-size:0.9rem;-webkit-appearance:none;appearance:none;cursor:pointer;"
                aria-label="Choose language">

          <option value="es">ES</option>
          <option value="fr">FR</option>
          <option value="pt">PT</option>
        </select>
      </label>
